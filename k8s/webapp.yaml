apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-docs-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-docs
  template:
    metadata:
      labels:
        app: web-docs
    spec:
      containers:
      - name: web-server
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-docs-service
spec:
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 80
  selector:
    app: web-docs