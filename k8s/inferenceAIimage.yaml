apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-ai-deployment
  labels:
    app: inference-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-ai
  template:
    metadata:
      labels:
        app: inference-ai
    spec:
      # Si tu imagen en Docker Hub es privada, activa imagePullSecrets (ver instrucciones abajo)
      imagePullSecrets:
        - name: regcred
      containers:
        - name: inference-ai-container
          # Ajusta la imagen/tag según lo que subas a Docker Hub
          image: davids117/aiimagerecognition:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
              protocol: TCP
          # Variables de entorno (tomadas desde el Secret hf-token)
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
            - name: HUGGINGFACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
          # Recursos (ajusta según lo que necesites)
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          # Liveness / Readiness (usamos tcpSocket para gRPC)
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: inference-ai-service
  labels:
    app: inference-ai
spec:
  type: LoadBalancer
  selector:
    app: inference-ai
  ports:
    - name: grpc
      port: 50051      # puerto expuesto externamente en el LoadBalancer
      targetPort: 50051
      protocol: TCP